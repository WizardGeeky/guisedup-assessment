      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
