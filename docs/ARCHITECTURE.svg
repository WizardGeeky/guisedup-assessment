  <text x="100" y="474" fill="#a78bfa" font-size="9">Socket emit</text>

  <!-- ═══════════ JWT FLOW CALLOUT ═══════════ -->
  <rect x="30" y="492" width="310" height="100" rx="10" fill="#0f172a" fill-opacity="0.7" stroke="#334155" stroke-width="1"/>
  <text x="185" y="512" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">JWT AUTH FLOW</text>
  <text x="45" y="532" fill="#e2e8f0" font-size="9">1. POST /auth/login → accessToken (15m)</text>
  <text x="45" y="548" fill="#e2e8f0" font-size="9">                  + refreshToken (7d)</text>
  <text x="45" y="564" fill="#e2e8f0" font-size="9">2. 401 → interceptor → POST /auth/refresh</text>
  <text x="45" y="580" fill="#e2e8f0" font-size="9">3. New pair issued, old token revoked</text>
  <text x="45" y="596" fill="#64748b" font-size="8.5" font-style="italic">⟳ Token rotation on every refresh (stored in DB)</text>

  <!-- ═══════════ RANKING CALLOUT ═══════════ -->
  <rect x="30" y="604" width="310" height="126" rx="10" fill="#0f172a" fill-opacity="0.7" stroke="#334155" stroke-width="1"/>
  <text x="185" y="624" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">FEED RANKING FORMULA</text>
  <text x="185" y="648" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">F = 0.35·S + 0.30·R + 0.20·A + 0.15·T</text>
  <text x="45" y="668" fill="#a78bfa" font-size="9">S — Semantic similarity (cosine, embedding avg)</text>
  <text x="45" y="684" fill="#34d399" font-size="9">R — Relationship depth (LN-normalized count)</text>
  <text x="45" y="700" fill="#fbbf24" font-size="9">A — Authenticity heuristics (pre-computed)</text>
  <text x="45" y="716" fill="#60a5fa" font-size="9">T — Time decay  e^(-0.0144·hours)  48h half-life</text>
  <text x="45" y="732" fill="#64748b" font-size="8.5" font-style="italic">Zero engagement metrics — no likes/shares signals</text>

